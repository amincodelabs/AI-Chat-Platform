services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "${PRIVATEAICHAT_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - privateaichat
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: src/PrivateAiChat.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Authentication__CookieSecurePolicy: ${PRIVATEAICHAT_AUTH_COOKIE_SECURE_POLICY:-Always}
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=PrivateAiChat;User Id=sa;Password=${PRIVATEAICHAT_SQL_PASSWORD:?Set PRIVATEAICHAT_SQL_PASSWORD in .env};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      ConnectionStrings__Redis: redis:6379,password=${PRIVATEAICHAT_REDIS_PASSWORD:?Set PRIVATEAICHAT_REDIS_PASSWORD in .env},abortConnect=false
      Database__ApplyMigrations: ${PRIVATEAICHAT_APPLY_MIGRATIONS:-false}
      Database__AllowProductionAutoMigrations: ${PRIVATEAICHAT_ALLOW_PRODUCTION_AUTO_MIGRATIONS:-false}
      Redis__Required: "true"
      Cors__AllowedOriginsCsv: ${PRIVATEAICHAT_CORS_ALLOWED_ORIGINS:-}
      RequestLimits__MaxRequestBodyBytes: ${PRIVATEAICHAT_MAX_REQUEST_BODY_BYTES:-1048576}
      Security__Hsts__Enabled: ${PRIVATEAICHAT_HSTS_ENABLED:-false}
      DevelopmentSeed__Enabled: "false"
      Ollama__BaseUrl: http://ollama:11434
      Ollama__Model: ${OLLAMA_MODEL:-llama3.2:1b}
      Ollama__TimeoutSeconds: ${OLLAMA_TIMEOUT_SECONDS:-120}
      RateLimiting__Auth__PermitLimit: ${RATE_LIMIT_AUTH_PERMIT_LIMIT:-5}
      RateLimiting__Auth__WindowSeconds: ${RATE_LIMIT_AUTH_WINDOW_SECONDS:-60}
      RateLimiting__Chat__PermitLimit: ${RATE_LIMIT_CHAT_PERMIT_LIMIT:-20}
      RateLimiting__Chat__WindowSeconds: ${RATE_LIMIT_CHAT_WINDOW_SECONDS:-60}
      RateLimiting__General__PermitLimit: ${RATE_LIMIT_GENERAL_PERMIT_LIMIT:-120}
      RateLimiting__General__WindowSeconds: ${RATE_LIMIT_GENERAL_WINDOW_SECONDS:-60}
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - privateaichat
    volumes:
      - data-protection-keys:/home/app/.aspnet/DataProtection-Keys
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: src/PrivateAiChat.Web/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Api__BaseUrl: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    networks:
      - privateaichat
    volumes:
      - data-protection-keys:/home/app/.aspnet/DataProtection-Keys
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: ${PRIVATEAICHAT_SQL_PID:-Express}
      MSSQL_SA_PASSWORD: ${PRIVATEAICHAT_SQL_PASSWORD:?Set PRIVATEAICHAT_SQL_PASSWORD in .env}
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - privateaichat
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/1433'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${PRIVATEAICHAT_REDIS_PASSWORD:?Set PRIVATEAICHAT_REDIS_PASSWORD in .env}"]
    environment:
      PRIVATEAICHAT_REDIS_PASSWORD: ${PRIVATEAICHAT_REDIS_PASSWORD:?Set PRIVATEAICHAT_REDIS_PASSWORD in .env}
    security_opt:
      - no-new-privileges:true
    networks:
      - privateaichat
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${PRIVATEAICHAT_REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:0.5.7
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - privateaichat
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

networks:
  privateaichat:
    driver: bridge

volumes:
  sqlserver-data:
  ollama-models:
  data-protection-keys:
